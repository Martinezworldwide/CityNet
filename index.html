This root index.html exists so that GitHub Pages (configured with folder=/root)
serves the interactive CityNet dashboard instead of the README.
The actual layout, styling, and logic live in frontend/index.html and related JS files.
-->
<script>

    window.location.href = window.location.pathname.replace(/\/?$/, "/frontend/") + window.location.search + window.location.hash;
</script>
<noscript>
    JavaScript is required for the CityNet dashboard. Please enable JavaScript and reload.
</noscript>
